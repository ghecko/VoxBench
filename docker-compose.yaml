services:
  # Updated Spark service (The "Super-Dockerfile" for Blackwell/GB10)
  voxhub-spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        MODEL_ID: ${MODEL_ID:-mistralai/Voxtral-Mini-4B-Realtime-2602}
        PREDOWNLOAD_MODEL: ${PREDOWNLOAD_MODEL:-1}
    image: voxhub:spark
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_ID=${MODEL_ID:-mistralai/Voxtral-Mini-4B-Realtime-2602}
    command: --help

  # Legacy/Other platform fallbacks (kept for compatibility)
  voxhub-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: voxhub:rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    privileged: true
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: --help --device rocm

  voxhub-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: voxhub:cpu
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: --help --device cpu

  # ─── VoxHub OpenAI-Compatible API ────────────────────────────
  voxhub-api:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: voxhub-api:spark
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VOXHUB_MODEL=${VOXHUB_MODEL:-whisper:turbo}
      - VOXHUB_VAD=pyannote
      - VOXHUB_DIARIZE=true
      - VOXHUB_DEVICE=auto
    entrypoint: ["python", "server.py"]

volumes:
  multi_hf_cache:
