services:
  # Updated Spark service (The "Super-Dockerfile" for Blackwell/GB10)
  voxhub-spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
      args:
        MODEL_ID: ${MODEL_ID:-mistralai/Voxtral-Mini-4B-Realtime-2602}
        PREDOWNLOAD_MODEL: ${PREDOWNLOAD_MODEL:-1}
    image: voxhub:spark
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - MODEL_ID=${MODEL_ID:-mistralai/Voxtral-Mini-4B-Realtime-2602}
    command: --help

  # Legacy/Other platform fallbacks (kept for compatibility)
  voxhub-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: voxhub:rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    privileged: true
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: --help --device rocm

  voxhub-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: voxhub:cpu
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: --help --device cpu

  # ─── VoxHub OpenAI-Compatible API ────────────────────────────
  voxhub-api:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: voxhub-api:spark
    # Pin the container name and hostname so other compose projects on the
    # shared network can address it as http://voxhub-api:8000 regardless of
    # this project's directory name (which compose otherwise prefixes).
    container_name: voxhub-api
    hostname: voxhub-api
    # No `ports:` block — the API is reachable only via the shared
    # proxy-net Docker network at http://voxhub-api:8000. To expose it on
    # the host as well, add e.g. `ports: ["127.0.0.1:8000:8000"]`.
    expose:
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
      - ./outputs:/outputs
      - ./audio:/data
      - multi_hf_cache:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VOXHUB_MODEL=${VOXHUB_MODEL:-whisper:turbo}
      - VOXHUB_VAD=hybrid
      - VOXHUB_DIARIZE=true
      - VOXHUB_DEVICE=auto
    entrypoint: ["python", "server.py"]
    networks:
      - default            # keeps intra-project links working
      - hinotes-internal   # private link to the OpenHiNotes backend

volumes:
  multi_hf_cache:

networks:
  # Private network owned by the OpenHiNotes compose project. VoxHub joins
  # it as `external` so the OpenHiNotes backend can reach voxhub-api at
  # http://voxhub-api:8000 over a closed bridge — never via Caddy / LAN.
  #
  # The network must already exist when VoxHub starts. The OpenHiNotes
  # compose stack creates it (declared without `external:` on its side); if
  # OpenHiNotes is not running, create it manually:
  #     docker network create hinotes-internal
  #
  # See README ("Cross-project networking") for the matching OpenHiNotes
  # backend-side YAML block.
  hinotes-internal:
    external: true
    name: hinotes-internal
